/* ===========================================================================
   SISFO SPPD KPU Jawa Barat — Stylesheet
   Tema: navy (#0b2447) · emas (#f1c40f) · merah (#c1121f) · putih
   Mobile-first, responsif, tanpa framework.
   ========================================================================= */

:root {
  --navy: #0b2447;
  --navy-2: #143a6b;
  --navy-3: #1d4e89;
  --gold: #f1c40f;
  --gold-d: #d4ac0d;
  --red: #c1121f;
  --green: #1e8449;
  --green-bg: #e8f6ee;
  --orange: #b9770e;
  --orange-bg: #fdf3e2;
  --red-bg: #fdeaea;
  --blue-bg: #e9f0fb;
  --gray-bg: #eef1f5;

  --bg: #f4f6fa;
  --surface: #ffffff;
  --line: #e2e8f0;
  --text: #1f2a37;
  --muted: #64748b;

  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 1px 2px rgba(16,24,40,.06), 0 6px 18px rgba(16,24,40,.08);
  --shadow-sm: 0 1px 2px rgba(16,24,40,.08);

  --sidebar-w: 248px;
  --topbar-h: 58px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--navy-3); text-decoration: none; }
h1,h2,h3,h4 { margin: 0 0 .4em; line-height: 1.25; }
p { margin: 0 0 .6em; }

function roleAllowed(route, user) {
  return route.roles === '*' || (user && route.roles.includes(user.role));
}

function badgeCount(route, user) {
  if (route.badge === 'inbox') return inboxFor(user).length;
  if (route.badge === 'spj') return mySppd(user).filter((s) => ['TERBIT', 'PELAKSANAAN', 'SPJ_REVISI'].includes(s.status)).length;
  return 0;
}

/* ----- Render shell ----- */
let contentEl = null;

function buildShell(user) {
  const app = document.getElementById('app');
  app.removeAttribute('aria-busy');

  const navItems = ROUTES.filter((r) => r.nav && roleAllowed(r, user));
  const navHTML = navItems.map((r) => {
    const c = badgeCount(r, user);
    return `<a href="#/${r.path}" data-path="${r.path}">
      <span class="ico">${r.icon}</span><span>${esc(r.title)}</span>
      ${c ? `<span class="pill">${c}</span>` : ''}</a>`;
  }).join('');

  const primary = navItems.filter((r) => r.primary).slice(0, 4);
  const bottomHTML = primary.map((r) => {

    return `<a href="#/${r.path}" data-path="${r.path}"><span class="ico">${r.icon}</span>${esc(ROLES[user.role] && r.title.length > 12 ? r.title.split(' ')[0] : r.title)}${c ? '<span class="dot"></span>' : ''}</a>`;

  scrim.onclick = closeSidebar;

function openAccountMenu() {
  __requireAsync("ui").then(({ modal }) => {

      title: 'Akun',

function doLogout() { logout(); renderApp(); toast('Anda telah keluar.'); }

/* ----- Routing ----- */
function handleRoute(path, parts) {
  const user = currentUser();
  if (!user) { renderApp(); return; }
  if (!contentEl) buildShell(user);

  const route = ROUTES.find((r) => r.path === parts[0]) || ROUTES[0];
  if (!roleAllowed(route, user)) {
    contentEl.innerHTML = `<div class="empty"><div class="big">🔒</div><h3>Akses dibatasi</h3>
      <p class="muted">Menu ini tidak tersedia untuk peran <b>${esc(roleLabel(user.role))}</b>.</p>
      <a class="btn btn-primary" href="#/dashboard">Ke Dashboard</a></div>`;
    setActive('dashboard'); document.getElementById('page-title').textContent = 'Akses dibatasi';
    return;
  }

  document.getElementById('page-title').textContent = route.title;
  setActive(route.path);
  window.scrollTo(0, 0);
  try {
    route.render(contentEl, parts);
  } catch (e) {
    console.error(e);
    contentEl.innerHTML = `<div class="empty"><div class="big">⚠️</div><h3>Terjadi kesalahan</h3><p class="muted">${esc(e.message)}</p></div>`;
  }
  refreshBadges(user);
}

function setActive(path) {
  document.querySelectorAll('[data-path]').forEach((a) =>
    a.classList.toggle('active', a.getAttribute('data-path') === path));
}

function refreshBadges(user = currentUser()) {
  if (!user) return;
  ROUTES.filter((r) => r.nav && r.badge).forEach((r) => {
    const c = badgeCount(r, user);
    document.querySelectorAll(`.nav a[data-path="${r.path}"]`).forEach((a) => {
      let pill = a.querySelector('.pill');
      if (c) { if (!pill) { pill = document.createElement('span'); pill.className = 'pill'; a.appendChild(pill); } pill.textContent = c; }
      else if (pill) pill.remove();
    });
  });
}

/* Navigasi terprogram dari view. */
function navigate(path) { go(path); }

/* ----- Status jaringan ----- */
function updateNet() {
  const pill = document.getElementById('net-pill');
  if (!pill) return;
  pill.innerHTML = navigator.onLine ? '' : '<span class="badge badge-amber" title="Mode luring">● Offline</span>';
}
window.addEventListener('online', () => { updateNet(); toast('Kembali daring.', 'ok'); });
window.addEventListener('offline', () => { updateNet(); toast('Mode offline aktif — data tetap tersimpan lokal.', 'warn'); });

/* ----- Tampilkan login atau shell ----- */
function renderApp() {
  const user = currentUser();
  contentEl = null;
  if (!user) {
    renderLogin(document.getElementById('app'), () => { renderApp(); go('/dashboard'); });
    return;
  }
  buildShell(user);
  handleRoute(currentPath(), currentPath().split('/').filter(Boolean));
}

/* ----- Service Worker ----- */
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw && nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateBanner(reg);
        });
      });
    }).catch((e) => console.warn('SW gagal:', e));
  });
}

function showUpdateBanner(reg) {
  const b = document.createElement('div');
  b.className = 'update-banner';
  b.innerHTML = `<span>Versi baru tersedia.</span><button class="btn btn-gold btn-sm">Muat ulang</button>`;
  b.querySelector('button').onclick = () => { reg.waiting?.postMessage('SKIP_WAITING'); location.reload(); };
  document.body.appendChild(b);
  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
}

/* Penyegaran badge navigasi setelah ada perubahan data dari view. */
window.addEventListener('sppd:changed', () => refreshBadges());

/* ----- Bootstrap ----- */
seedIfEmpty();
  /* Service Worker dinonaktifkan pada versi file-tunggal */
startRouter(handleRoute);
renderApp();

return { refreshBadges, navigate };
};

/* ===========================================================================
   auth.js — Sesi pengguna & peran (role-based access).
   Demo: login dengan memilih akun pegawai. Kata sandi bersifat opsional
   (lingkungan demo). Sesi disimpan di localStorage.
   ========================================================================= */

const { store } = __require("store");

const ROLES = {
  pegawai:   { label: 'Pegawai Pemohon',     short: 'Pegawai',   desc: 'Mengajukan perjalanan dinas & SPJ' },
  atasan:    { label: 'Atasan Langsung',     short: 'Atasan',    desc: 'Verifikasi kebutuhan tugas' },
  keuangan:  { label: 'Kasubbag Keuangan',   short: 'Keuangan',  desc: 'Verifikasi ketersediaan anggaran' },
  ppk:       { label: 'PPK',                 short: 'PPK',       desc: 'Persetujuan teknis & administrasi' },
  kpa:       { label: 'KPA / Sekretaris',    short: 'KPA',       desc: 'Pengesahan akhir & penerbitan dokumen' },
  bendahara: { label: 'Bendahara Pengeluaran', short: 'Bendahara', desc: 'Verifikasi bukti & pembayaran' },
  auditor:   { label: 'Auditor / Inspektorat', short: 'Auditor', desc: 'Monitoring & audit trail' },
};

function roleLabel(role) { return ROLES[role]?.label || role; }

let _current = null;

function currentUser() {
  if (_current) return _current;
  const id = store.pref('sessionUserId');
  if (!id) return null;
  _current = store.find('pegawai', id);
  return _current;
}

function login(userId) {
  const u = store.find('pegawai', userId);
  if (!u) return null;
  store.pref('sessionUserId', userId);
  _current = u;
  return u;
}

function logout() {
  store.pref('sessionUserId', null);
  _current = null;
}

function hasRole(...roles) {
  const u = currentUser();
  return !!u && roles.includes(u.role);
}

return { ROLES, roleLabel, currentUser, login, logout, hasRole };
};

__modules["domain"] = function(){
/* ===========================================================================
   domain.js — Aturan bisnis SPPD: mesin status alur persetujuan, perhitungan
   biaya berbasis SBM, penerbitan dokumen + QR, SPJ, pembayaran, audit trail,
   ringkasan anggaran (DIPA), dan deteksi duplikasi klaim.
   ========================================================================= */

const { store, uid, nextNumber } = __require("store");
const { currentUser } = __require("auth");

/* ----- Definisi status & badge ----- */
const STATUS = {
  DRAFT:                 { label: 'Draf',                 badge: 'badge-gray',  group: 'draft' },
  MENUNGGU_ATASAN:       { label: 'Menunggu Atasan',      badge: 'badge-amber', group: 'pengajuan', role: 'atasan' },
  MENUNGGU_KEUANGAN:     { label: 'Verifikasi Keuangan',  badge: 'badge-amber', group: 'pengajuan', role: 'keuangan' },
  MENUNGGU_PPK:          { label: 'Persetujuan PPK',      badge: 'badge-amber', group: 'pengajuan', role: 'ppk' },
  MENUNGGU_KPA:          { label: 'Pengesahan KPA',       badge: 'badge-amber', group: 'pengajuan', role: 'kpa' },
  REVISI:                { label: 'Perlu Revisi',         badge: 'badge-red',   group: 'pengajuan', role: null },
  DITOLAK:               { label: 'Ditolak',              badge: 'badge-red',   group: 'selesai' },
  TERBIT:                { label: 'Dokumen Terbit',       badge: 'badge-blue',  group: 'pelaksanaan' },
  PELAKSANAAN:           { label: 'Pelaksanaan',          badge: 'badge-blue',  group: 'pelaksanaan' },
  SPJ_MENUNGGU_BENDAHARA:{ label: 'SPJ — Verif Bendahara',badge: 'badge-amber', group: 'spj', role: 'bendahara' },
  SPJ_MENUNGGU_PPK:      { label: 'SPJ — Persetujuan PPK', badge: 'badge-amber', group: 'spj', role: 'ppk' },
  SPJ_MENUNGGU_KPA:      { label: 'SPJ — Pengesahan KPA', badge: 'badge-amber', group: 'spj', role: 'kpa' },
  SPJ_REVISI:            { label: 'SPJ — Perlu Revisi',   badge: 'badge-red',   group: 'spj', role: null },
  SPJ_DISETUJUI:         { label: 'SPJ Disetujui',        badge: 'badge-gold',  group: 'spj', role: 'bendahara' },
  SELESAI:               { label: 'Selesai & Dibayar',    badge: 'badge-green', group: 'selesai' },
};

function statusInfo(s) { return STATUS[s] || { label: s, badge: 'badge-gray' }; }

/* Peran yang harus bertindak pada status tertentu (null = tidak ada). */
function pendingRole(status) { return STATUS[status]?.role || null; }

/* Urutan langkah alur persetujuan pengajuan (untuk tampilan stepper). */
const PENGAJUAN_FLOW = ['MENUNGGU_ATASAN', 'MENUNGGU_KEUANGAN', 'MENUNGGU_PPK', 'MENUNGGU_KPA', 'TERBIT'];
const SPJ_FLOW = ['SPJ_MENUNGGU_BENDAHARA', 'SPJ_MENUNGGU_PPK', 'SPJ_MENUNGGU_KPA', 'SPJ_DISETUJUI', 'SELESAI'];

const APPROVE_NEXT = {
  MENUNGGU_ATASAN: 'MENUNGGU_KEUANGAN',
  MENUNGGU_KEUANGAN: 'MENUNGGU_PPK',
  MENUNGGU_PPK: 'MENUNGGU_KPA',
  MENUNGGU_KPA: 'TERBIT',
  SPJ_MENUNGGU_BENDAHARA: 'SPJ_MENUNGGU_PPK',
  SPJ_MENUNGGU_PPK: 'SPJ_MENUNGGU_KPA',
  SPJ_MENUNGGU_KPA: 'SPJ_DISETUJUI',
};

const APPROVE_ACTION = {
  MENUNGGU_ATASAN: 'Menyetujui (atasan langsung)',
  MENUNGGU_KEUANGAN: 'Memverifikasi ketersediaan anggaran',
  MENUNGGU_PPK: 'Menyetujui (teknis & administrasi)',
  MENUNGGU_KPA: 'Mengesahkan & menerbitkan dokumen',
  SPJ_MENUNGGU_BENDAHARA: 'Memverifikasi bukti SPJ',
  SPJ_MENUNGGU_PPK: 'Menyetujui SPJ',
  SPJ_MENUNGGU_KPA: 'Mengesahkan SPJ',
};

/* ----- Data master & util ----- */
function sbmFor(provinsi) {
  return store.list('sbm').find((s) => s.provinsi === provinsi) || null;
}

function hitungLamaHari(berangkat, kembali) {
  if (!berangkat || !kembali) return 1;
  return Math.max(1, Math.round((new Date(kembali) - new Date(berangkat)) / 86400000) + 1);
}

function hitungBiaya(provinsi, lamaHari, transport = 0, lainnya = 0) {
  const sbm = sbmFor(provinsi);
  const uangHarian = (sbm ? sbm.uangHarian : 400000) * lamaHari;
  const penginapan = (sbm ? sbm.penginapan : 700000) * Math.max(0, lamaHari - 1);
  const rincian = { uangHarian, penginapan, transport: +transport || 0, lainnya: +lainnya || 0 };
  const total = rincian.uangHarian + rincian.penginapan + rincian.transport + rincian.lainnya;
  return { rincian, total };
}

/* ----- Audit ----- */
function logAudit(action, sppd, note = '', actor = currentUser()) {
  const audit = store.list('audit');
  audit.unshift({
    id: uid('log-'), ts: new Date().toISOString(),
    actorId: actor?.id || 'system', role: actor?.role || 'system',
    action, entity: 'SPPD', entityId: sppd?.id || '-',
    detail: `${sppd?.perihal || ''}${note ? ' — ' + note : ''}`,
  });
  store.set('audit', audit.slice(0, 500));
}

function pushHistory(sppd, action, status, note, actor) {
  sppd.history = sppd.history || [];
  sppd.history.push({ ts: new Date().toISOString(), actorId: actor.id, role: actor.role, action, status, note: note || '' });
  sppd.updatedTs = Date.now();
}

function save(sppd) { store.upsert('sppd', sppd); return sppd; }

/* ----- Aksi: pengajuan ----- */
function submitPengajuan(sppd, actor = currentUser()) {
  sppd.status = 'MENUNGGU_ATASAN';
  pushHistory(sppd, 'Mengajukan perjalanan dinas', sppd.status, '', actor);
  logAudit('Mengajukan perjalanan dinas', sppd, '', actor);
  return save(sppd);
}

function approve(sppd, note = '', actor = currentUser()) {
  const from = sppd.status;
  const to = APPROVE_NEXT[from];
  if (!to) throw new Error('Status tidak dapat disetujui: ' + from);
  const action = APPROVE_ACTION[from] || 'Menyetujui';

  if (to === 'TERBIT') issueDocuments(sppd, actor);
  if (from === 'MENUNGGU_KEUANGAN') sppd.biayaDisetujui = sppd.totalBiaya; // kunci nilai disetujui
  if (to === 'SPJ_DISETUJUI' && sppd.spj) sppd.spj.status = 'DISETUJUI';

  sppd.status = to;
  pushHistory(sppd, action, to, note, actor);
  logAudit(action, sppd, note, actor);
  return save(sppd);
}

function requestRevision(sppd, note, actor = currentUser()) {
  const isSpj = sppd.status.startsWith('SPJ');
  sppd.status = isSpj ? 'SPJ_REVISI' : 'REVISI';
  if (isSpj && sppd.spj) sppd.spj.status = 'REVISI';
  pushHistory(sppd, 'Meminta revisi', sppd.status, note, actor);
  logAudit('Meminta revisi', sppd, note, actor);
  return save(sppd);
}

function reject(sppd, note, actor = currentUser()) {
  sppd.status = 'DITOLAK';
  pushHistory(sppd, 'Menolak pengajuan', 'DITOLAK', note, actor);
  logAudit('Menolak pengajuan', sppd, note, actor);
  return save(sppd);
}

function resubmit(sppd, actor = currentUser()) {
  const isSpj = sppd.status === 'SPJ_REVISI';
  sppd.status = isSpj ? 'SPJ_MENUNGGU_BENDAHARA' : 'MENUNGGU_ATASAN';
  if (isSpj && sppd.spj) sppd.spj.status = 'DIAJUKAN';
  pushHistory(sppd, 'Mengirim ulang setelah revisi', sppd.status, '', actor);
  logAudit('Mengirim ulang setelah revisi', sppd, '', actor);
  return save(sppd);
}

/* ----- Penerbitan dokumen + QR ----- */
function pad3(n) { return String(n).padStart(3, '0'); }

function issueDocuments(sppd, actor = currentUser()) {
  const st = nextNumber('ST');
  const spd = nextNumber('SPD');
  const rand = Math.random().toString(16).slice(2, 8).toUpperCase();
  sppd.documents = {
    suratTuganNo: `${pad3(st.seq)}/ST/PP.05-SD/32/${st.year}`,
    sppdNo: `${pad3(spd.seq)}/SPD/PP.05-SD/32/${spd.year}`,
    tglTerbit: new Date().toISOString(),
    qrToken: `STKPUJABAR-${pad3(st.seq)}-${st.year}-${rand}`,
  };
  return sppd;
}

/* ----- Pelaksanaan ----- */
function addCheckin(sppd, data, actor = currentUser()) {
  sppd.pelaksanaan = sppd.pelaksanaan || { checkin: [], bukti: [], catatan: '' };
  sppd.pelaksanaan.checkin.push({ ts: new Date().toISOString(), ...data });
  if (sppd.status === 'TERBIT') sppd.status = 'PELAKSANAAN';
  pushHistory(sppd, 'Check-in lokasi kegiatan', sppd.status, data.lokasi || '', actor);
  logAudit('Check-in lokasi kegiatan', sppd, data.lokasi || '', actor);
  return save(sppd);
}

/* ----- SPJ ----- */
function submitSPJ(sppd, spjData, actor = currentUser()) {
  sppd.spj = { ...spjData, status: 'DIAJUKAN', diajukanTs: new Date().toISOString() };
  sppd.status = 'SPJ_MENUNGGU_BENDAHARA';
  pushHistory(sppd, 'Mengajukan pertanggungjawaban (SPJ)', sppd.status, '', actor);
  logAudit('Mengajukan pertanggungjawaban (SPJ)', sppd, '', actor);
  return save(sppd);
}

/* ----- Pembayaran ----- */
function recordPayment(sppd, payment, actor = currentUser()) {
  sppd.pembayaran = { ...payment, tgl: new Date().toISOString() };
  sppd.status = 'SELESAI';
  if (sppd.spj) sppd.spj.status = 'DIBAYAR';
  pushHistory(sppd, 'Mencairkan pembayaran', 'SELESAI', payment.buktiNo || '', actor);
  logAudit('Mencairkan pembayaran', sppd, payment.buktiNo || '', actor);

/* ===========================================================================
   qr.js — Render QR Code untuk validasi dokumen.
   Memuat pustaka 'qrcode' dari CDN (di-cache Service Worker untuk dukungan

   pertama, menampilkan token validasi sebagai teks (graceful fallback).

   ========================================================================= */

  if (window.QRCode) return Promise.resolve(window.QRCode);
  if (loader) return loader;

    const s = document.createElement('script');
    s.src = CDN; s.async = true;
    s.onload = () => resolve(window.QRCode);
    s.onerror = () => reject(new Error('Gagal memuat pustaka QR'));
    document.head.appendChild(s);
  });
  return loader;
}

    const QR = await loadLib();

    container.appendChild(canvas);
    await QR.toCanvas(canvas, text, { width: size, margin: 1, color: { dark: '#0b2447', light: '#ffffff' } });

  resolver = resolve;

  if (resolver) resolver('/' + parts.join('/'), parts);

  const parts = path.split('/').filter(Boolean);
  if (resolver) resolver('/' + parts.join('/'), parts);
}

  return (location.hash.replace(/^#/, '') || '/dashboard');
}

return { startRouter, go, currentPath };

  try {
    localStorage.setItem(KEY(collection), JSON.stringify(value));

   views/spj.js — Daftar SPJ milik pemohon: perlu diisi & sedang diproses.
   ========================================================================= */

const { currentUser } = __require("auth");
const { mySppd } = __require("domain");
const { renderSppdList, emptyState } = __require("views/shared");

function renderSpj(root) {
  const u = currentUser();
  const mine = mySppd(u);
  const perlu = mine.filter((s) => ['TERBIT', 'PELAKSANAAN', 'SPJ_REVISI'].includes(s.status));
  const proses = mine.filter((s) => ['SPJ_MENUNGGU_BENDAHARA', 'SPJ_MENUNGGU_PPK', 'SPJ_MENUNGGU_KPA', 'SPJ_DISETUJUI'].includes(s.status));
  const selesai = mine.filter((s) => s.status === 'SELESAI');

  root.innerHTML = `
  <div class="page-head"><div><h1>Pertanggungjawaban (SPJ)</h1>
    <p class="desc">Lengkapi laporan & bukti perjalanan dinas yang telah dilaksanakan.</p></div></div>

  <h3 class="card-title" style="margin:6px 0 10px"><span class="ico">📝</span> Perlu Disusun / Diperbaiki (${perlu.length})</h3>
  <div id="perlu"></div>
  <h3 class="card-title" style="margin:22px 0 10px"><span class="ico">⏳</span> Dalam Proses Verifikasi (${proses.length})</h3>
  <div id="proses"></div>
  <h3 class="card-title" style="margin:22px 0 10px"><span class="ico">✅</span> Selesai (${selesai.length})</h3>
  <div id="selesai"></div>`;

  const wrap = (sel, data, empty) => {
    const el = root.querySelector(sel);
    if (!data.length) { el.innerHTML = emptyState('🗂️', 'Tidak ada', empty); return; }
    renderSppdList(el, data, { showPemohon: false });
  };
  wrap('#perlu', perlu, 'Tidak ada SPPD yang menunggu SPJ.');
  wrap('#proses', proses, 'Tidak ada SPJ dalam verifikasi.');
  wrap('#selesai', selesai, 'Belum ada SPJ yang selesai.');
}

return { renderSpj };
};
  __require('app');
})();

</script>
</body>
</html>
